name: Programmers Code Review

on:
  push:
    branches:
      - main
    paths:
      - '**.py'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Prepare Info
        id: prepare
        run: |
          git config core.quotepath false
          FILES=$(git diff --name-only --diff-filter=AM HEAD^ HEAD | grep '\.py' || true)

          if [ -z "$FILES" ]; then
            echo "has_files=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          FIRST_FILE=$(echo $FILES | awk '{print $1}')
          echo "first_file=$FIRST_FILE" >> $GITHUB_OUTPUT
          echo "review_date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

          # 파일 경로에서 메타정보 추출
          # 예상 경로: 프로그래머스/2/131533. 문제이름/solution.py
          DIR=$(dirname "$FIRST_FILE")
          PROB_NAME=$(basename "$DIR")
          LEVEL=$(basename "$(dirname "$DIR")")  # "2", "3" 등 숫자 디렉토리

          echo "prob_name=$PROB_NAME" >> $GITHUB_OUTPUT
          echo "level=$LEVEL" >> $GITHUB_OUTPUT

          # 같은 디렉토리의 README.md 경로 설정
          README_PATH="$DIR/README.md"
          echo "readme_path=$README_PATH" >> $GITHUB_OUTPUT
          echo "has_files=true" >> $GITHUB_OUTPUT

      - name: Read README for Constraints
        if: steps.prepare.outputs.has_files == 'true'
        id: parse
        run: |
          README_PATH="${{ steps.prepare.outputs.readme_path }}"
          FIRST_FILE="${{ steps.prepare.outputs.first_file }}"

          # README.md에서 제약조건 읽기 (백준허브가 자동 생성)
          if [ -f "$README_PATH" ]; then
            echo "✅ README.md 발견: $README_PATH"
            # README 전체를 constraints로 사용 (문제 설명 + 제약조건 포함)
            cat "$README_PATH" > constraints.txt
          else
            echo "⚠️ README.md 없음 - 제약조건 없이 코드만 리뷰"
            echo "제약 조건 정보 없음" > constraints.txt
          fi

          # solution.py 상단에서 tags만 파싱 (선택사항)
          TAGS=$(grep -m1 '# tags:' "$FIRST_FILE" | sed 's/# tags://' | xargs || echo "")
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Generate Prompt
        if: steps.prepare.outputs.has_files == 'true'
        run: |
          FIRST_FILE="${{ steps.prepare.outputs.first_file }}"
          PROB_NAME="${{ steps.prepare.outputs.prob_name }}"
          LV="${{ steps.prepare.outputs.level }}"
          TAGS="${{ steps.parse.outputs.tags }}"

          cat <<EOF > full_prompt.txt
          너는 알고리즘 효율성과 파이썬 성능 최적화의 대가야.
          현재 분석 중인 문제는 프로그래머스 Lv.${LV} "${PROB_NAME}"이며, 알고리즘 분류는 [${TAGS}]야.

          [문제 설명 및 제약 조건]
          아래는 백준허브가 자동 생성한 문제 README야. 문제 설명과 제약 조건이 포함되어 있어.
          반드시 이 내용을 바탕으로 분석할 것.

          $(cat constraints.txt)

          [작성 원칙]
          - 반드시 위에서 제공된 실제 제약 조건(N 범위, 시간 제한 등)을 바탕으로 분석할 것.
          - 모든 분석은 핵심 위주로 간결하게 작성할 것.
          - 반드시 개조식(Bullet point)을 사용할 것.
          - 칭찬은 생략하고, '개선할 점'과 '잠재적 위험'에만 집중할 것.

          [리뷰 미션]
          1. **분석**: 실제 제한 대비 현재 코드의 시간/공간 복잡도($O$ 표기법 사용) 진단.
          2. **개선할 점**: 성능 병목 지점 지적 및 파이썬 특화 최적화 기법 제안.
          3. **반례 (Edge Case)**: 코드가 실패할 수 있는 경계값이나 특수 상황 제시.
          4. **수정 제안 (전체 코드)**: 위 개선 사항을 모두 반영한 완성된 전체 파이썬 코드를 코드블록으로 제시할 것. 주석은 한국어로 작성할 것.

          답변은 한국어로 작성해.

          [제출된 코드]
          $(cat "$FIRST_FILE")
          EOF

      - name: AI Review (Gemini 2.5 Flash + Retry)
        if: steps.prepare.outputs.has_files == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT=$(cat full_prompt.txt)
          PAYLOAD=$(jq -n --arg text "$PROMPT" '{contents: [{parts: [{text: $text}]}]}')

          API_URL="https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-04-17:generateContent?key=${GEMINI_API_KEY}"

          MAX_RETRY=3
          WAIT=30  # 초기 대기시간(초)
          SUCCESS=false

          for i in $(seq 1 $MAX_RETRY); do
            echo "▶ AI 리뷰 시도 $i/$MAX_RETRY..."

            HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
              -X POST "$API_URL" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")

            echo "HTTP Status: $HTTP_STATUS"

            if [ "$HTTP_STATUS" = "200" ]; then
              # 응답에서 텍스트 추출
              REVIEW=$(jq -r '.candidates[0].content.parts[0].text' response.json)
              if [ -n "$REVIEW" ] && [ "$REVIEW" != "null" ]; then
                echo "$REVIEW" > review_result.txt
                echo "✅ AI 리뷰 성공"
                SUCCESS=true
                break
              fi
            fi

            # 429(Rate Limit) 또는 기타 실패 처리
            ERROR_MSG=$(jq -r '.error.message // "알 수 없는 오류"' response.json)
            echo "⚠️ 실패: $ERROR_MSG"

            if [ $i -lt $MAX_RETRY ]; then
              echo "⏳ ${WAIT}초 후 재시도..."
              sleep $WAIT
              WAIT=$((WAIT * 2))  # 지수 백오프: 30 -> 60 -> 120초
            fi
          done

          if [ "$SUCCESS" = "false" ]; then
            echo "AI 리뷰 생성에 실패했습니다. (${MAX_RETRY}회 시도 후 실패)" > review_result.txt
          fi

      - name: Create Issue
        if: steps.prepare.outputs.has_files == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const code = fs.readFileSync("${{ steps.prepare.outputs.first_file }}", 'utf8');
            const review = fs.readFileSync('review_result.txt', 'utf8');

            const lv = "${{ steps.prepare.outputs.level }}";
            const tags = "${{ steps.parse.outputs.tags }}".split(',').map(t => t.trim()).filter(t => t);
            const probName = "${{ steps.prepare.outputs.prob_name }}";
            const reviewDate = "${{ steps.prepare.outputs.review_date }}";

            const lvColors = {
              "0": "c2e0c6", "1": "f9d0c4", "2": "fef2c0",
              "3": "d4c5f9", "4": "bfd4f2", "5": "c5def5"
            };
            const lvLabel = `Lv.${lv}`;
            const lvColor = lvColors[lv] || "ededed";

            const ensureLabel = async (name, color) => {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner, repo: context.repo.repo, name
                });
              } catch (e) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo, name, color
                });
              }
            };

            await ensureLabel(lvLabel, lvColor);
            for (const tag of tags) await ensureLabel(tag, 'ededed');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[${reviewDate}] AI 리뷰: ${probName} (Lv.${lv})`,
              body: [
                `## 📝 제출 코드`,
                `\`\`\`python\n${code}\n\`\`\``,
                `---`,
                `## 🤖 AI 분석 결과`,
                `**난이도:** Lv.${lv} | **문제:** ${probName}`,
                ``,
                review
              ].join('\n\n'),
              labels: [lvLabel, ...tags]
            });

            const issueNumber = issue.data.number;
            console.log(`Created issue: #${issueNumber}`);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                "### ✍️ 오늘의 복기 기록",
                "",
                "**1. 핵심 로직**",
                "- ",
                "",
                "**2. 시행착오**",
                "- ",
                "",
                "**3. 새롭게 알게 된 팁**",
                "- "
              ].join('\n')
            });
