name: Programmers Code Review

on:
  push:
    branches:
      - main
    paths:
      - '**.py'
  workflow_dispatch:
    inputs:
      target_file:
        description: '리뷰할 파일 경로 (예: 프로그래머스/2/131533. 문제이름/solution.py)'
        required: true

permissions:
  issues: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Prepare Info
        id: prepare
        run: |
          git config core.quotepath false

          # 수동 실행이면 input 사용, 푸시면 git diff 사용
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FIRST_FILE="${{ github.event.inputs.target_file }}"
            if [ ! -f "$FIRST_FILE" ]; then
              echo "❌ 파일을 찾을 수 없습니다: $FIRST_FILE"
              echo "has_files=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "✅ 수동 실행: $FIRST_FILE"
          else
            FILES=$(git diff --name-only --diff-filter=AM HEAD^ HEAD | grep '\.py' || true)
            if [ -z "$FILES" ]; then
              echo "has_files=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            FIRST_FILE=$(echo $FILES | awk '{print $1}')
            echo "✅ 자동 실행: $FIRST_FILE"
          fi

          echo "first_file=$FIRST_FILE" >> $GITHUB_OUTPUT
          echo "review_date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

          # 파일 경로에서 메타정보 추출
          # 예상 경로: 프로그래머스/2/131533. 문제이름/solution.py
          DIR=$(dirname "$FIRST_FILE")
          PROB_NAME=$(basename "$DIR")
          LEVEL=$(basename "$(dirname "$DIR")")  # "2", "3" 등 숫자 디렉토리

          echo "prob_name=$PROB_NAME" >> $GITHUB_OUTPUT
          echo "level=$LEVEL" >> $GITHUB_OUTPUT

          # 같은 디렉토리의 README.md 경로 설정
          README_PATH="$DIR/README.md"
          echo "readme_path=$README_PATH" >> $GITHUB_OUTPUT
          echo "has_files=true" >> $GITHUB_OUTPUT

      - name: Read README for Constraints
        if: steps.prepare.outputs.has_files == 'true'
        id: parse
        run: |
          README_PATH="${{ steps.prepare.outputs.readme_path }}"
          FIRST_FILE="${{ steps.prepare.outputs.first_file }}"

          # README.md에서 제약조건 읽기 (백준허브가 자동 생성)
          if [ -f "$README_PATH" ]; then
            echo "✅ README.md 발견: $README_PATH"
            cat "$README_PATH" > constraints.txt
          else
            echo "⚠️ README.md 없음 - 제약조건 없이 코드만 리뷰"
            echo "제약 조건 정보 없음" > constraints.txt
          fi

          # solution.py 상단에서 tags만 파싱 (선택사항)
          TAGS=$(grep -m1 '# tags:' "$FIRST_FILE" | sed 's/# tags://' | xargs || echo "")
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Generate Prompt
        if: steps.prepare.outputs.has_files == 'true'
        run: |
          FIRST_FILE="${{ steps.prepare.outputs.first_file }}"
          PROB_NAME="${{ steps.prepare.outputs.prob_name }}"
          LV="${{ steps.prepare.outputs.level }}"
          TAGS="${{ steps.parse.outputs.tags }}"

          cat <<EOF > full_prompt.txt
          너는 알고리즘 효율성과 파이썬 성능 최적화의 대가야.
          현재 분석 중인 문제는 프로그래머스 Lv.${LV} "${PROB_NAME}"이며, 알고리즘 분류는 [${TAGS}]야.

          [문제 설명 및 제약 조건]
          아래는 백준허브가 자동 생성한 문제 README야. 문제 설명과 제약 조건이 포함되어 있어.
          반드시 이 내용을 바탕으로 분석할 것.

          $(cat constraints.txt)

          [참고 사항]
          - 이 코드는 이미 테스트를 통과한 정답 코드야. 틀린 부분을 고치는 게 아니라, 더 잘 짤 수 있었는지 분석하는 게 목적이야.
          - 반드시 위에서 제공된 실제 제약 조건(N 범위, 시간 제한 등)을 바탕으로 분석할 것.
          - 알고리즘 평가 시 이론적 시간복잡도뿐 아니라 Python 런타임 특성(내장 함수의 C 구현, 객체 생성 오버헤드, 상수 계수 등)을 함께 고려하여 실제 실행 속도 기준으로 판단할 것.
          - 모든 분석은 핵심 위주로 간결하게 작성할 것.
          - 반드시 개조식(Bullet point)을 사용할 것.
          - 칭찬은 생략하고 개선 포인트에만 집중할 것.

          [리뷰 미션]
          1. **내 코드 알고리즘**: 제출된 코드가 사용한 알고리즘/자료구조를 한 줄로 요약할 것.
          2. **최적 알고리즘**: 이 문제를 푸는 가장 효율적인 알고리즘/자료구조를 한 줄로 제시할 것. 이론적 복잡도뿐 아니라 Python 런타임 특성을 고려한 실제 실행 속도 기준으로 판단할 것. 내 코드와 같다면 "현재 코드가 최적"이라고 명시할 것.
          3. **복잡도 분석**: 현재 코드의 시간/공간 복잡도($O$ 표기법)를 진단하고, 제약 조건 대비 여유/위험 여부를 평가할 것. 이론적 복잡도 외에 Python 객체 생성 오버헤드나 내장 함수 활용 여부 등 실제 성능에 영향을 주는 요소가 있다면 함께 언급할 것.
          4. **개선 방향**: 먼저 2번에서 제시한 최적 알고리즘이 현재 코드와 다른지 판단할 것.

          [경우 A] 최적 알고리즘이 현재 코드와 다른 경우:
          - 최적 알고리즘으로 전체를 재작성할 것.
          - 현재 코드 대비 실제로 빠른 이유를 Python 런타임 관점에서 설명할 것.
          - 이 경우 아래 세부 개선은 생략할 것.

          [경우 B] 최적 알고리즘이 현재 코드와 같은 경우:
          - 아래 우선순위 순서대로 검토하고, 해당되는 항목만 제안할 것.
            1) 파이썬 내장 자료구조 활용 (Counter, defaultdict, heapq 등)
            2) 코드 간결성 (list comprehension 등)
          - 개선할 부분이 없으면 "개선 불필요"라고 명시할 것.
          각 항목은 아래 형식으로 작성할 것.
          - **개선 내용**: 무엇을 바꾸는지
          - **이유**: 왜 더 나은지
          - **동작 방식**: 실제 제출된 코드에서 개선되는 부분을 기준으로, 해당 기법이 어떻게 동작하는지 초보자도 이해할 수 있도록 2~3문장으로 설명. 코드에 없는 메서드나 기법은 언급하지 말 것.

          5. **최종 코드**: 4번 결과를 반영한 실행 가능한 전체 파이썬 코드를 코드블록으로 제시할 것. 4번 설명과 코드가 반드시 일치해야 함. 각 블록마다 한국어 주석으로 동작을 설명할 것.

          답변은 한국어로 작성해.

          [제출된 코드]
          $(cat "$FIRST_FILE")
          EOF

      - name: AI Review (OpenRouter + Retry)
        if: steps.prepare.outputs.has_files == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          PROMPT=$(cat full_prompt.txt)
          PAYLOAD=$(jq -n --arg text "$PROMPT" '{
            model: "openai/gpt-oss-120b",
            messages: [{role: "user", content: $text}],
            temperature: 0.6,
            top_p: 0.95,
            max_completion_tokens: 8192,
            reasoning_effort: "high",
            include_reasoning: false
          }')

          API_URL="https://openrouter.ai/api/v1/chat/completions"

          MAX_RETRY=3
          WAIT=30  # 초기 대기시간(초)
          SUCCESS=false

          for i in $(seq 1 $MAX_RETRY); do
            echo "▶ AI 리뷰 시도 $i/$MAX_RETRY..."

            HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
              -X POST "$API_URL" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${OPENROUTER_API_KEY}" \
              -d "$PAYLOAD")

            echo "HTTP Status: $HTTP_STATUS"

            if [ "$HTTP_STATUS" = "200" ]; then
              # OpenAI 호환 응답 형식
              REVIEW=$(jq -r '.choices[0].message.content' response.json)
              if [ -n "$REVIEW" ] && [ "$REVIEW" != "null" ]; then
                echo "$REVIEW" > review_result.txt
                echo "✅ AI 리뷰 성공"
                SUCCESS=true
                break
              fi
            fi

            ERROR_MSG=$(jq -r '.error.message // "알 수 없는 오류"' response.json)
            echo "⚠️ 실패: $ERROR_MSG"

            if [ $i -lt $MAX_RETRY ]; then
              echo "⏳ ${WAIT}초 후 재시도..."
              sleep $WAIT
              WAIT=$((WAIT * 2))  # 지수 백오프: 30 -> 60 -> 120초
            fi
          done

          if [ "$SUCCESS" = "false" ]; then
            echo "AI 리뷰 생성에 실패했습니다. (${MAX_RETRY}회 시도 후 실패)" > review_result.txt
          fi

      - name: Create Issue
        if: steps.prepare.outputs.has_files == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const code = fs.readFileSync("${{ steps.prepare.outputs.first_file }}", 'utf8');
            const review = fs.readFileSync('review_result.txt', 'utf8');

            const lv = "${{ steps.prepare.outputs.level }}";
            const tags = "${{ steps.parse.outputs.tags }}".split(',').map(t => t.trim()).filter(t => t);
            const probName = "${{ steps.prepare.outputs.prob_name }}";
            const reviewDate = "${{ steps.prepare.outputs.review_date }}";

            const lvColors = {
              "0": "c2e0c6", "1": "f9d0c4", "2": "fef2c0",
              "3": "d4c5f9", "4": "bfd4f2", "5": "c5def5"
            };
            const lvLabel = `Lv.${lv}`;
            const lvColor = lvColors[lv] || "ededed";

            const ensureLabel = async (name, color) => {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner, repo: context.repo.repo, name
                });
              } catch (e) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo, name, color
                });
              }
            };

            await ensureLabel(lvLabel, lvColor);
            for (const tag of tags) await ensureLabel(tag, 'ededed');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[${reviewDate}] AI 리뷰: ${probName} (Lv.${lv})`,
              body: [
                `## 📝 제출 코드`,
                `\`\`\`python\n${code}\n\`\`\``,
                `---`,
                `## 🤖 AI 분석 결과`,
                `**난이도:** Lv.${lv} | **문제:** ${probName}`,
                ``,
                review
              ].join('\n\n'),
              labels: [lvLabel, ...tags]
            });

            const issueNumber = issue.data.number;
            console.log(`Created issue: #${issueNumber}`);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                "### ✍️ 복기 기록",
                "",
                "**1. 풀이**",
                "- ",
                "",
                "**2. 막힌 부분**",
                "- ",
                "",
                "**3. 리뷰 후 배운 점**",
                "- "
              ].join('\n')
            });
