name: Algorithm Code Review

on:
  push:
    branches:
      - main
    paths:
      - '**.py'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Prepare Basic Info
        id: prepare
        run: |
          git config core.quotepath false
          FILES=$(git diff --name-only --diff-filter=AM HEAD^ HEAD | grep '\.py' || true)
          
          if [ -z "$FILES" ]; then
            echo "has_files=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "review_date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          FIRST_FILE=$(echo $FILES | awk '{print $1}')
          PROBLEM_INFO=$(basename "$(dirname "$FIRST_FILE")")
          echo "title_info=$PROBLEM_INFO" >> $GITHUB_OUTPUT
          
          # 문제 번호 추출 (예: "1000.A+B" -> "1000")
          PROBLEM_NO=$(echo $PROBLEM_INFO | cut -d'.' -f1 | tr -d ' ')
          echo "prob_no=$PROBLEM_NO" >> $GITHUB_OUTPUT

          # Solved.ac API 호출 (난이도 및 태그 정보)
          RESPONSE=$(curl -s "https://solved.ac/api/v3/problem/show?problemId=$PROBLEM_NO")
          PROB_LEVEL=$(echo $RESPONSE | jq -r '.level')
          ALGO_TAGS=$(echo $RESPONSE | jq -r '.tags[].displayNames[] | select(.language=="ko") | .name' | tr '\n' ',' | sed 's/,$//')
          
          echo "prob_level=$PROB_LEVEL" >> $GITHUB_OUTPUT
          echo "algo_tags=$ALGO_TAGS" >> $GITHUB_OUTPUT
          echo "first_file=$FIRST_FILE" >> $GITHUB_OUTPUT
          echo "has_files=true" >> $GITHUB_OUTPUT

      - name: Fetch Problem Constraints (Crawling)
        if: steps.prepare.outputs.has_files == 'true'
        id: crawl
        run: |
          pip install requests beautifulsoup4
          
          python3 - <<EOF > problem_details.txt
          import requests
          from bs4 import BeautifulSoup
          import os

          prob_no = "${{ steps.prepare.outputs.prob_no }}"
          url = f"https://www.acmicpc.net/problem/{prob_no}"
          headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36"}
          
          try:
              res = requests.get(url, headers=headers)
              soup = BeautifulSoup(res.text, 'html.parser')
              
              # 시간/메모리 제한 테이블 추출
              info_table = soup.select('#problem-info tr td')
              time_limit = info_table[0].text.strip()
              mem_limit = info_table[1].text.strip()
              
              # 입력 제약 사항 텍스트 추출
              input_section = soup.select_one('#problem_input').text.strip()
              
              print(f"### 실제 문제 제약 조건 ###")
              print(f"- 시간 제한: {time_limit}")
              print(f"- 메모리 제한: {mem_limit}")
              print(f"- 입력 설명 및 범위:\n{input_section}")
          except Exception as e:
              print(f"상세 정보를 가져오는 데 실패했습니다: {e}")
          EOF

      - name: Generate AI Prompt
        if: steps.prepare.outputs.has_files == 'true'
        run: |
          PROBLEM_NO="${{ steps.prepare.outputs.prob_no }}"
          ALGO_TAGS="${{ steps.prepare.outputs.algo_tags }}"
          FIRST_FILE="${{ steps.prepare.outputs.first_file }}"
          
          cat <<EOF > full_prompt.txt
          너는 알고리즘 효율성과 파이썬 성능 최적화의 대가야. 
          현재 분석 중인 문제는 백준 ${PROBLEM_NO}번이며, 알고리즘 분류는 [${ALGO_TAGS}]야.

          $(cat problem_details.txt)

          [작성 원칙]
          - 반드시 위에서 제공된 **실제 제약 조건(N, M 범위, 시간 제한 등)**을 바탕으로 분석할 것.
          - 모든 분석은 핵심 위주로 아주 간결하게 작성할 것.
          - 반드시 개조식(Bullet point)을 사용할 것.
          - 칭찬은 생략하고, '개선할 점'과 '잠재적 위험'에만 집중할 것.

          [리뷰 미션]
          0. **문제 요약**: 핵심 요구사항과 제약 조건을 한 줄 요약.
          1. **분석**: 실제 제한 대비 현재 코드의 시간/공간 복잡도($O$ 표기법 사용) 진단.
          2. **개선할 점**: 성능 병목 지점 지적 및 파이썬 특화 최적화 기법 제안.
          3. **반례 (Edge Case)**: 코드가 실패할 수 있는 경계값이나 특수 상황 제시.
          4. **수정 제안 (전체 코드)**: 위 개선 사항을 모두 반영한 완성된 전체 파이썬 코드를 코드블록으로 제시할 것. 일부만 발췌하거나 생략 없이 실행 가능한 완전한 코드여야 함. 주석은 한국말로 작성할 것.

          답변은 한국어로 작성해.

          [제출된 코드]
          $(cat $FIRST_FILE)
          EOF

      - name: AI Review
        if: steps.prepare.outputs.has_files == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          npm install -g @google/gemini-cli
          gemini --model "gemini-2.5-flash" \
                 --prompt "$(cat full_prompt.txt)" > review_result.txt

      - name: Create Issue
        if: steps.prepare.outputs.has_files == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const code = fs.readFileSync("${{ steps.prepare.outputs.first_file }}", 'utf8');
            const review = fs.readFileSync('review_result.txt', 'utf8');
            
            const tierColors = {
              "Bronze": "ad5600", "Silver": "435f7a", "Gold": "ec9a00",
              "Platinum": "27e2a4", "Diamond": "00b4fc", "Ruby": "ff0062", "Unrated": "2d2d2d"
            };

            const getTierInfo = (level) => {
              const tiers = ["Bronze", "Silver", "Gold", "Platinum", "Diamond", "Ruby"];
              const roman = ["V", "IV", "III", "II", "I"];
              if (!level || level === 0 || isNaN(level)) return { name: "Unrated", color: tierColors["Unrated"] };
              const tierIndex = Math.floor((level - 1) / 5);
              const romanIndex = (level - 1) % 5;
              return { name: `${tiers[tierIndex]} ${roman[romanIndex]}`, color: tierColors[tiers[tierIndex]] };
            };

            const tier = getTierInfo(parseInt("${{ steps.prepare.outputs.prob_level }}"));
            const ensureLabel = async (name, color) => {
              try { await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: name }); }
              catch (e) { await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: name, color: color }); }
            };

            await ensureLabel(tier.name, tier.color);
            const algoTags = "${{ steps.prepare.outputs.algo_tags }}".split(',').filter(t => t);
            for (const tag of algoTags) { await ensureLabel(tag, 'ededed'); }
            
            const issue = await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `[${{ steps.prepare.outputs.review_date }}] AI 리뷰: ${{ steps.prepare.outputs.title_info }}`,
              body: `## 📝 제출 코드\n\n\`\`\`python\n${code}\n\`\`\`\n\n---\n\n## 🤖 AI 분석 결과\n**난이도:** ${tier.name} | **링크:** https://www.acmicpc.net/problem/${{ steps.prepare.outputs.prob_no }}\n\n${review}`,
              labels: [tier.name, ...algoTags]
            });

            // ✅ 이 부분 추가 - number 확인
            const issueNumber = issue.data.number;
            console.log(`Created issue number: ${issueNumber}`);
            
            if (!issueNumber) {
              throw new Error(`Issue number is invalid: ${JSON.stringify(issue.data)}`);
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,  // ✅ 변수로 분리
              body: "### ✍️ 오늘의 복기 기록\n\n**1. 핵심 로직**\n- \n\n**2. 시행착오**\n- \n\n**3. 새롭게 알게 된 팁**\n- "
            });
